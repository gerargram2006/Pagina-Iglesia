# =============================================================================
# Archivo docker-compose.yml - Configuración de Docker para MySQL
# =============================================================================
# Define un servicio de MySQL 8.0 que se ejecuta en un contenedor Docker.
# Se usa para desarrollo local, evitando necesitar una instalación local de MySQL.
#
# Uso:
#   docker-compose up -d    → Inicia el contenedor en segundo plano
#   docker-compose down     → Detiene y elimina el contenedor
#   docker ps               → Verifica que el contenedor esté corriendo
#   docker logs mysql-proyecto-iglesia  → Ver logs del contenedor
# =============================================================================

# Servicios definidos en esta configuración
services:
  # Servicio de base de datos MySQL
  db:
    image: mysql:8.0                          # Imagen oficial de MySQL 8.0 desde Docker Hub
    container_name: mysql-proyecto-iglesia    # Nombre personalizado del contenedor (fácil de identificar)
    restart: always                           # Reinicia automáticamente si el contenedor falla o se reinicia el sistema
    environment:
      # Variables de entorno que Docker usa para configurar MySQL al crearlo
      # Lee directamente desde el archivo .env del proyecto
      MYSQL_DATABASE: ${DB_NAME}              # Crea automáticamente la base de datos "iglesia_db"
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}     # Contraseña del usuario root de MySQL
    ports:
      - "3307:3306"                           # Mapea puerto 3307 del host al 3306 del contenedor
                                              # (se usa 3307 para evitar conflictos con otras instancias de MySQL)
    volumes:
      - mysql_data:/var/lib/mysql             # Volumen persistente: los datos sobreviven al detener el contenedor
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Copia init.sql al directorio de inicialización
                                              # Docker ejecuta automáticamente init.sql al crear el contenedor

# Definición de volúmenes persistentes
volumes:
  mysql_data:                                 # Volumen nombrado para almacenar datos de MySQL
                                              # Se guarda en /var/lib/docker/volumes/
